version: '3.8'

services:
  # === DATABASES ===
  postgres:
    image: postgres:16-alpine
    container_name: spa-postgres
    environment:
      POSTGRES_DB: spa_ecosystem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # === BACKEND SERVICES ===
  api-gateway:
    build:
      context: ./backend
      dockerfile: ./api-gateway/Dockerfile
    container_name: spa-api-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - JWT_SECRET=spa-ecosystem-jwt-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  auth-service:
    build:
      context: ./backend
      dockerfile: ./auth-service/Dockerfile
    container_name: spa-auth-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - JWT_SECRET=spa-ecosystem-jwt-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

  crm-service:
    build:
      context: ./backend
      dockerfile: ./crm-service/Dockerfile
    container_name: spa-crm-service
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - NODE_ENV=development
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - JWT_SECRET=spa-ecosystem-jwt-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

  booking-service:
    build:
      context: ./backend
      dockerfile: ./booking-service/Dockerfile
    container_name: spa-booking-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - NODE_ENV=development
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - JWT_SECRET=spa-ecosystem-jwt-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

  pos-service:
    build:
      context: ./backend
      dockerfile: ./pos-service/Dockerfile
    container_name: spa-pos-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - NODE_ENV=development
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - JWT_SECRET=spa-ecosystem-jwt-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

  inventory-service:
    build:
      context: ./backend
      dockerfile: ./inventory-service/Dockerfile
    container_name: spa-inventory-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - NODE_ENV=development
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - JWT_SECRET=spa-ecosystem-jwt-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

  ai-gateway:
    build:
      context: ./backend
      dockerfile: ./ai-gateway/Dockerfile
    container_name: spa-ai-gateway
    ports:
      - "3010:3010"
    environment:
      - PORT=3010
      - NODE_ENV=development
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - JWT_SECRET=spa-ecosystem-jwt-secret-change-in-production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  analytics-service:
    build:
      context: ./backend
      dockerfile: ./analytics-service/Dockerfile
    container_name: spa-analytics-service
    ports:
      - "3013:3013"
    environment:
      - PORT=3013
      - NODE_ENV=development
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - JWT_SECRET=spa-ecosystem-jwt-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

  admin-service:
    build:
      context: ./backend
      dockerfile: ./admin-service/Dockerfile
    container_name: spa-admin-service
    ports:
      - "3015:3015"
    environment:
      - PORT=3015
      - NODE_ENV=development
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - JWT_SECRET=spa-ecosystem-jwt-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
