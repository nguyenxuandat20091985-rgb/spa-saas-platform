version: '3.8'

# ==========================================
# ĐỊNH NGHĶA CẤU HÌNH DÙNG CHUNG (DRY Principle)
# ==========================================
x-service-defaults: &service-defaults
  restart: unless-stopped
  environment:
    - NODE_ENV=${NODE_ENV:-development}
    - LOG_LEVEL=${LOG_LEVEL:-debug}
    - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-spa_ecosystem}
    - REDIS_URL=redis://redis:6379
    - JWT_SECRET=${JWT_SECRET}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - spa-network

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 40s

# ==========================================
# DỊCH VỤ (SERVICES)
# ==========================================
services:
  # ---------- DATABASES ----------
  postgres:
    image: postgres:16-alpine
    container_name: spa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spa_ecosystem}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-spa_ecosystem}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - spa-network

  redis:
    image: redis:7-alpine
    container_name: spa-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - spa-network

  # ---------- MINIO (FILE STORAGE) ----------
  minio:
    image: minio/minio:latest
    container_name: spa-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 20s
    networks:
      - spa-network

  # ==========================================
  # BACKEND MICROSERVICES
  # ==========================================

  # ---------- 1. API GATEWAY ----------
  api-gateway:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: ./api-gateway/Dockerfile
    container_name: spa-api-gateway
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    environment:
      - PORT=${API_GATEWAY_PORT:-3000}
      - SERVICE_AUTH_URL=http://auth-service:${AUTH_SERVICE_PORT:-3001}
      - SERVICE_BOOKING_URL=http://booking-service:${BOOKING_SERVICE_PORT:-3003}
      - SERVICE_POS_URL=http://pos-service:${POS_SERVICE_PORT:-3004}
      - SERVICE_INVENTORY_URL=http://inventory-service:${INVENTORY_SERVICE_PORT:-3005}
      - SERVICE_CRM_URL=http://crm-service:${CRM_SERVICE_PORT:-3006}
      - SERVICE_NOTIFICATION_URL=http://notification-service:${NOTIFICATION_SERVICE_PORT:-3007}
      - SERVICE_BILLING_URL=http://billing-service:${BILLING_SERVICE_PORT:-3008}
      - SERVICE_MEMBERSHIP_URL=http://membership-service:${MEMBERSHIP_SERVICE_PORT:-3009}
      - SERVICE_AI_GATEWAY_URL=http://ai-gateway:${AI_GATEWAY_PORT:-3010}
      - SERVICE_ANALYTICS_URL=http://analytics-service:${ANALYTICS_SERVICE_PORT:-3013}
      - SERVICE_MEDIA_URL=http://media-service:${MEDIA_SERVICE_PORT:-3014}
      - SERVICE_ADMIN_URL=http://admin-service:${ADMIN_SERVICE_PORT:-3015}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]

  # ---------- 2. AUTH SERVICE ----------
  auth-service:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: ./auth-service/Dockerfile
    container_name: spa-auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-3001}:3001"
    environment:
      - PORT=${AUTH_SERVICE_PORT:-3001}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]

  # ---------- 3. BOOKING SERVICE ----------
  booking-service:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: ./booking-service/Dockerfile
    container_name: spa-booking-service
    ports:
      - "${BOOKING_SERVICE_PORT:-3003}:3003"
    environment:
      - PORT=${BOOKING_SERVICE_PORT:-3003}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]

  # ---------- 4. POS SERVICE ----------
  pos-service:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: ./pos-service/Dockerfile
    container_name: spa-pos-service
    ports:
      - "${POS_SERVICE_PORT:-3004}:3004"
    environment:
      - PORT=${POS_SERVICE_PORT:-3004}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]

  # ---------- 5. INVENTORY SERVICE ----------
  inventory-service:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: ./inventory-service/Dockerfile
    container_name: spa-inventory-service
    ports:
      - "${INVENTORY_SERVICE_PORT:-3005}:3005"
    environment:
      - PORT=${INVENTORY_SERVICE_PORT:-3005}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3005/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]

  # ---------- 6. CRM SERVICE ----------
  crm-service:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: ./crm-service/Dockerfile
    container_name: spa-crm-service
    ports:
      - "${CRM_SERVICE_PORT:-3006}:3006"
    environment:
      - PORT=${CRM_SERVICE_PORT:-3006}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3006/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]

  # ---------- 7. NOTIFICATION SERVICE ----------
  notification-service:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: ./notification-service/Dockerfile
    container_name: spa-notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-3007}:3007"
    environment:
      - PORT=${NOTIFICATION_SERVICE_PORT:-3007}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMS_PROVIDER=${SMS_PROVIDER:-twilio}
      - SMS_ACCOUNT_SID=${SMS_ACCOUNT_SID}
      - SMS_AUTH_TOKEN=${SMS_AUTH_TOKEN}
      - SMS_FROM=${SMS_FROM:-SpaEco}
      - ZALO_ACCESS_TOKEN=${ZALO_ACCESS_TOKEN}
      - ZALO_OA_ID=${ZALO_OA_ID}
      - FIREBASE_SERVER_KEY=${FIREBASE_SERVER_KEY}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3007/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]

  # ---------- 8. BILLING SERVICE ----------
  billing-service:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: ./billing-service/Dockerfile
    container_name: spa-billing-service
    ports:
      - "${BILLING_SERVICE_PORT:-3008}:3008"
    environment:
      - PORT=${BILLING_SERVICE_PORT:-3008}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - VNPAY_MERCHANT_ID=${VNPAY_MERCHANT_ID}
      - VNPAY_SECRET_KEY=${VNPAY_SECRET_KEY}
      - MOMO_PARTNER_CODE=${MOMO_PARTNER_CODE}
      - MOMO_ACCESS_KEY=${MOMO_ACCESS_KEY}
      - MOMO_SECRET_KEY=${MOMO_SECRET_KEY}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3008/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]

  # ---------- 9. MEMBERSHIP SERVICE ----------
  membership-service:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: ./membership-service/Dockerfile
    container_name: spa-membership-service
    ports:
      - "${MEMBERSHIP_SERVICE_PORT:-3009}:3009"
    environment:
      - PORT=${MEMBERSHIP_SERVICE_PORT:-3009}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3009/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]

  # ---------- 10. AI GATEWAY ----------
  ai-gateway:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: ./ai-gateway/Dockerfile
    container_name: spa-ai-gateway
    ports:
      - "${AI_GATEWAY_PORT:-3010}:3010"
    environment:
      - PORT=${AI_GATEWAY_PORT:-3010}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEFAULT_AI_PROVIDER=${DEFAULT_AI_PROVIDER:-gemini}
      - VECTOR_DB_HOST=qdrant
      - VECTOR_DB_PORT=${VECTOR_DB_PORT:-6333}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3010/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]

  # ---------- 11. QDRANT (VECTOR DB) ----------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: spa-qdrant
    restart: unless-stopped
    ports:
      - "${VECTOR_DB_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${VECTOR_DB_API_KEY:-}
    networks:
      - spa-network

  # ---------- 12. ANALYTICS SERVICE ----------
  analytics-service:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: ./analytics-service/Dockerfile
    container_name: spa-analytics-service
    ports:
      - "${ANALYTICS_SERVICE_PORT:-3013}:3013"
    environment:
      - PORT=${ANALYTICS_SERVICE_PORT:-3013}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3013/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]

  # ---------- 13. MEDIA SERVICE ----------
  media-service:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: ./media-service/Dockerfile
    container_name: spa-media-service
    ports:
      - "${MEDIA_SERVICE_PORT:-3014}:3014"
    environment:
      - PORT=${MEDIA_SERVICE_PORT:-3014}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-minio}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-spa-assets}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3014/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]

  # ---------- 14. ADMIN SERVICE ----------
  admin-service:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: ./admin-service/Dockerfile
    container_name: spa-admin-service
    ports:
      - "${ADMIN_SERVICE_PORT:-3015}:3015"
    environment:
      - PORT=${ADMIN_SERVICE_PORT:-3015}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3015/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]

# ---------- MẠNG (NETWORKS) ----------
networks:
  spa-network:
    name: spa-network
    driver: bridge

# ---------- VOLUMES (LƯU TRỮ DỮ LIỆU) ----------
volumes:
  postgres_data:
    name: spa-postgres-data
  redis_data:
    name: spa-redis-data
  minio_data:
    name: spa-minio-data
  qdrant_data:
    name: spa-qdrant-data