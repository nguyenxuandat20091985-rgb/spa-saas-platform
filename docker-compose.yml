version: '3.8'

# Định nghĩa các cấu hình dùng chung để tránh lặp lại (DRY principle)
x-service-defaults: &service-defaults
  environment:
    - NODE_ENV=development
    - DB_HOST=postgres
    - REDIS_HOST=redis
    - JWT_SECRET=${JWT_SECRET}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started

services:
  # === DATABASES ===
  postgres:
    image: postgres:16-alpine
    container_name: spa-postgres
    environment:
      POSTGRES_DB: spa_ecosystem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # === BACKEND SERVICES ===
  api-gateway:
    <<: *service-defaults
    build: { context: ./backend, dockerfile: ./api-gateway/Dockerfile }
    container_name: spa-api-gateway
    ports: ["3000:3000"]
    environment:
      - PORT=3000
      <<: *service-defaults.environment

  auth-service:
    <<: *service-defaults
    build: { context: ./backend, dockerfile: ./auth-service/Dockerfile }
    container_name: spa-auth-service
    ports: ["3001:3001"]
    environment:
      - PORT=3001
      <<: *service-defaults.environment

  crm-service:
    <<: *service-defaults
    build: { context: ./backend, dockerfile: ./crm-service/Dockerfile }
    container_name: spa-crm-service
    ports: ["3006:3006"]
    environment:
      - PORT=3006
      <<: *service-defaults.environment

  booking-service:
    <<: *service-defaults
    build: { context: ./backend, dockerfile: ./booking-service/Dockerfile }
    container_name: spa-booking-service
    ports: ["3003:3003"]
    environment:
      - PORT=3003
      <<: *service-defaults.environment

  pos-service:
    <<: *service-defaults
    build: { context: ./backend, dockerfile: ./pos-service/Dockerfile }
    container_name: spa-pos-service
    ports: ["3004:3004"]
    environment:
      - PORT=3004
      <<: *service-defaults.environment

  inventory-service:
    <<: *service-defaults
    build: { context: ./backend, dockerfile: ./inventory-service/Dockerfile }
    container_name: spa-inventory-service
    ports: ["3005:3005"]
    environment:
      - PORT=3005
      <<: *service-defaults.environment

  ai-gateway:
    <<: *service-defaults
    build: { context: ./backend, dockerfile: ./ai-gateway/Dockerfile }
    container_name: spa-ai-gateway
    ports: ["3010:3010"]
    environment:
      - PORT=3010
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      <<: *service-defaults.environment

  analytics-service:
    <<: *service-defaults
    build: { context: ./backend, dockerfile: ./analytics-service/Dockerfile }
    container_name: spa-analytics-service
    ports: ["3013:3013"]
    environment:
      - PORT=3013
      <<: *service-defaults.environment

  admin-service:
    <<: *service-defaults
    build: { context: ./backend, dockerfile: ./admin-service/Dockerfile }
    container_name: spa-admin-service
    ports: ["3015:3015"]
    environment:
      - PORT=3015
      <<: *service-defaults.environment

volumes:
  postgres_data:
  redis_data:
